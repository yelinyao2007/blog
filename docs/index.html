<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lynn's Lab</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0a0a0f;
            --card: #12121a;
            --primary: #00f0ff;
            --secondary: #00ff88;
            --text: #e0e0e0;
            --text-dim: #666;
        }

        body {
            font-family: 'Segoe UI', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .bg-grid {
            position: fixed;
            inset: 0;
            background-image: 
                linear-gradient(rgba(0,240,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,240,255,0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 20s linear infinite;
            pointer-events: none;
        }

        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 80px 20px;
            position: relative;
            z-index: 1;
        }

        .hero {
            text-align: center;
            margin-bottom: 60px;
        }

        .glitch {
            font-size: 3.5rem;
            font-weight: 700;
            letter-spacing: 4px;
            position: relative;
            text-shadow: 0 0 30px var(--primary);
        }

        .glitch::before,
        .glitch::after {
            content: 'Lynn\'s Lab';
            position: absolute;
            left: 0;
            width: 100%;
            opacity: 0.8;
        }

        .glitch::before {
            color: var(--primary);
            animation: glitch1 3s infinite;
            clip-path: polygon(0 0, 100% 0, 100% 35%, 0 35%);
        }

        .glitch::after {
            color: var(--secondary);
            animation: glitch2 2s infinite;
            clip-path: polygon(0 65%, 100% 65%, 100% 100%, 0 100%);
        }

        @keyframes glitch1 {
            0%, 100% { transform: translate(0); }
            20% { transform: translate(-3px, 3px); }
            40% { transform: translate(-3px, -3px); }
            60% { transform: translate(3px, 3px); }
            80% { transform: translate(3px, -3px); }
        }

        @keyframes glitch2 {
            0%, 100% { transform: translate(0); }
            20% { transform: translate(3px, -3px); }
            40% { transform: translate(3px, 3px); }
            60% { transform: translate(-3px, -3px); }
            80% { transform: translate(-3px, 3px); }
        }

        .subtitle {
            color: var(--text-dim);
            font-size: 1.1rem;
            margin-top: 15px;
            letter-spacing: 2px;
        }

        .status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 30px;
            padding: 10px 20px;
            background: var(--card);
            border: 1px solid var(--primary);
            border-radius: 4px;
            font-size: 0.9rem;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--primary);
            border-radius: 50%;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 5px var(--primary); }
            50% { opacity: 0.5; box-shadow: 0 0 15px var(--primary); }
        }

        .links {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 50px;
        }

        .link-card {
            background: var(--card);
            padding: 30px;
            border-radius: 8px;
            border: 1px solid #222;
            text-decoration: none;
            color: var(--text);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .link-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0,240,255,0.1), transparent);
            transition: left 0.5s;
        }

        .link-card:hover {
            border-color: var(--primary);
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,240,255,0.1);
        }

        .link-card:hover::before {
            left: 100%;
        }

        .link-card h3 {
            font-size: 1.2rem;
            margin-bottom: 8px;
            color: var(--primary);
        }

        .link-card p {
            font-size: 0.9rem;
            color: var(--text-dim);
        }

        .terminal {
            background: var(--card);
            border-radius: 8px;
            padding: 20px;
            margin-top: 50px;
            font-family: 'Consolas', monospace;
            font-size: 0.85rem;
            border: 1px solid #222;
        }

        .terminal-header {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
        }

        .terminal-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .terminal-dot:nth-child(1) { background: #ff5f56; }
        .terminal-dot:nth-child(2) { background: #ffbd2e; }
        .terminal-dot:nth-child(3) { background: #27ca40; }

        .terminal-line {
            color: var(--text-dim);
            margin: 5px 0;
        }

        .terminal-line span {
            color: var(--primary);
        }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    
    <div class="container">
        <div class="hero">
            <h1 class="glitch">Lynn's Lab</h1>
            <p class="subtitle">探索技术的无限可能</p>
            <div class="status">
                <div class="status-dot"></div>
                <span>系统在线 · 运行中</span>
            </div>
        </div>

        <div class="links">
            <a href="#" class="link-card">
                <h3>项目作品</h3>
                <p>查看我的开源项目和实验</p>
            </a>
            <a href="#" class="link-card">
                <h3>技术博客</h3>
                <p>分享编程心得与经验</p>
            </a>
            <a href="#" class="link-card">
                <h3>联系方式</h3>
                <p>与我建立联系</p>
            </a>
        </div>

        <div class="terminal">
            <div class="terminal-header">
                <div class="terminal-dot"></div>
                <div class="terminal-dot"></div>
                <div class="terminal-dot"></div>
            </div>
            <div class="terminal-line">$ whoami</div>
            <div class="terminal-line">> 开发者 | 技术爱好者 | 终身学习者</div>
            <div class="terminal-line">$ cat skills.json</div>
            <div class="terminal-line">> ["Python", "JavaScript", "Cloud", "AI/ML"]</div>
            <div class="terminal-line">$ echo $STATUS</div>
            <div class="terminal-line">> <span>Always Learning</span></div>
        </div>
    </div>
</body>
</html>
